name = "iota-validators-proxy"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
IOTA_UPSTREAM_URL = "https://api.mainnet.iota.cafe"
ALLOWED_ORIGINS = "*"

[[unsafe.bindings]]
name = "RL_IP"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 120, period = 60 }

[[unsafe.bindings]]
name = "RL_DEVICE"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

[observability]
enabled = true
